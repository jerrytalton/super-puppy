<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Super Puppy — Activity</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/pwa/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
<style>
:root {
  --bg: #f5f5f7; --surface: #fff; --surface2: #f0f0f2;
  --text: #1d1d1f; --text2: #86868b; --text3: #aeaeb2;
  --border: #d2d2d7; --accent: #007aff;
  --green: #34c759; --amber: #ff9f0a; --red: #ff3b30;
  --r: 12px; --rs: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000; --surface: #1c1c1e; --surface2: #2c2c2e;
    --text: #f5f5f7; --text2: #98989d; --text3: #636366;
    --border: #38383a;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  padding: 24px 32px; max-width: 960px; margin: 0 auto;
  -webkit-font-smoothing: antialiased;
  padding-top: env(safe-area-inset-top, 24px);
}

/* ── Nav (iOS / standalone) ── */
nav {
  display: none; gap: 4px; margin-bottom: 24px;
  border-bottom: 1px solid var(--border); padding-bottom: 12px;
}
nav ~ .period-bar { margin-top: 8px; }
@media (max-width: 600px) { nav { display: flex; } nav ~ .period-bar { margin-top: 0; } }
@media (display-mode: standalone) { nav { display: flex; } nav ~ .period-bar { margin-top: 0; } }
nav a {
  padding: 6px 16px; border-radius: 20px; text-decoration: none;
  color: var(--text2); font-size: 13px; font-weight: 500;
  transition: all 0.15s;
}
nav a:hover { color: var(--text); background: var(--surface2); }
nav a.active { color: #fff; background: var(--accent); }

/* ── Period selector ── */
.period-bar {
  display: flex; gap: 4px; margin-bottom: 20px;
}
.period-btn {
  padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text2); font-size: 13px;
  font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.period-btn:hover { color: var(--text); border-color: var(--text3); }
.period-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── Stats row ── */
.stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--rs); padding: 16px; text-align: center;
}
.stat-value { font-size: 28px; font-weight: 700; line-height: 1.1; }
.stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
.stat-value.has-errors { color: var(--red); }

/* ── Section titles ── */
.section-title {
  font-size: 13px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 12px;
}

/* ── Active requests ── */
.active-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.active-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--rs); padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.active-dot {
  width: 10px; height: 10px; border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.active-info { flex: 1; }
.active-desc { font-weight: 600; font-size: 14px; }
.active-meta { font-size: 12px; color: var(--text2); }
.active-elapsed {
  font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums;
  min-width: 60px; text-align: right;
}
.empty-state {
  text-align: center; color: var(--text3); padding: 32px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--rs); margin-bottom: 24px;
}

/* ── Tool breakdown ── */
.tool-bars { margin-bottom: 24px; }
.tool-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.tool-name { width: 100px; font-size: 12px; color: var(--text2); text-align: right; }
.tool-bar-wrap {
  flex: 1; height: 20px; background: var(--surface2);
  border-radius: 4px; overflow: hidden;
}
.tool-bar {
  height: 100%; background: var(--accent); border-radius: 4px;
  transition: width 0.4s ease; min-width: 2px;
}
.tool-meta {
  width: 160px; font-size: 12px; color: var(--text2);
  font-variant-numeric: tabular-nums; display: flex; gap: 8px;
}
.tool-meta .count { min-width: 50px; }
.tool-meta .avg { color: var(--text3); }

/* ── Backend tags ── */
.backend-tag {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
}
.backend-ollama { background: #e8f5e9; color: #2e7d32; }
.backend-mlx { background: #e3f2fd; color: #1565c0; }
@media (prefers-color-scheme: dark) {
  .backend-ollama { background: #1b3a1e; color: #66bb6a; }
  .backend-mlx { background: #0d2744; color: #42a5f5; }
}
.source-tag {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
  background: var(--surface2); color: var(--text3);
}
.source-mcp { background: #f3e8fd; color: #7c3aed; }
.source-playground { background: #fef3c7; color: #b45309; }
@media (prefers-color-scheme: dark) {
  .source-mcp { background: #2d1b4e; color: #a78bfa; }
  .source-playground { background: #3d2c0a; color: #fbbf24; }
}

/* ── History table ── */
.history-wrap { overflow-x: auto; margin-bottom: 8px; }
.history-table {
  width: 100%; border-collapse: collapse;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--rs); overflow: hidden;
  table-layout: fixed;
}
.history-table th {
  text-align: left; padding: 8px 12px; font-size: 11px;
  color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border); background: var(--surface2);
}
.history-table td {
  padding: 8px 12px; font-size: 13px;
  border-bottom: 1px solid var(--border);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.history-table tr:last-child td { border-bottom: none; }
.history-table .dur { font-variant-numeric: tabular-nums; text-align: right; }
.history-table .status-ok { color: var(--green); }
.history-table .status-error { color: var(--red); cursor: help; }
.history-table .col-tool { width: 14%; }
.history-table .col-model { width: 30%; }
.history-table .col-backend { width: 16%; }
.history-table .col-status { width: 8%; }
.history-table .col-dur { width: 16%; }
.history-table .col-when { width: 16%; }
.show-more-btn {
  display: block; width: 100%; padding: 10px; border: 1px solid var(--border);
  border-radius: var(--rs); background: var(--surface); color: var(--text2);
  font-size: 13px; cursor: pointer; text-align: center; transition: all 0.15s;
}
.show-more-btn:hover { color: var(--text); border-color: var(--text3); }

@media (max-width: 600px) {
  body { padding: 16px; }
  .tool-meta { width: 120px; }
  .tool-meta .avg { display: none; }
  .history-table .col-backend { display: none; }
}
</style>
</head>
<body>

<nav>
  <a href="/profiles">Profiles</a>
  <a href="/tools">Playground</a>
  <a href="/activity" class="active">Activity</a>
</nav>

<div class="period-bar" id="period-bar">
  <button class="period-btn" data-period="3600">1h</button>
  <button class="period-btn active" data-period="86400">24h</button>
  <button class="period-btn" data-period="604800">7d</button>
  <button class="period-btn" data-period="2592000">30d</button>
</div>

<div class="stats" id="stats">
  <div class="stat"><div class="stat-value" id="s-requests">0</div><div class="stat-label">Requests</div></div>
  <div class="stat"><div class="stat-value" id="s-errors">0</div><div class="stat-label">Errors</div></div>
  <div class="stat"><div class="stat-value" id="s-uptime">--</div><div class="stat-label">Uptime</div></div>
</div>

<div class="section-title">Active Requests</div>
<div class="active-list" id="active-list">
  <div class="empty-state">No active requests</div>
</div>

<div class="section-title">Tool Breakdown</div>
<div class="tool-bars" id="tool-bars"></div>

<div class="section-title">Request Log</div>
<div class="history-wrap">
<table class="history-table">
  <thead><tr>
    <th class="col-tool">Tool</th><th class="col-model">Model</th><th class="col-backend">Backend</th>
    <th class="col-status"></th><th class="col-dur dur">Duration</th><th class="col-when">When</th>
  </tr></thead>
  <tbody id="history-body"><tr><td colspan="6" style="text-align:center;color:var(--text3)">Waiting for data...</td></tr></tbody>
</table>
</div>
<button class="show-more-btn" id="show-more" style="display:none"></button>

<script>
const POLL_MS = 2000;
const PAGE_SIZE = 25;
let lastData = null;
let currentPeriod = 86400;
let historyVisible = PAGE_SIZE;
let _authToken = '';

(function() {
  const params = new URLSearchParams(location.search);
  if (params.has('token')) {
    _authToken = params.get('token');
    sessionStorage.setItem('sp_token', _authToken);
    params.delete('token');
    history.replaceState(null, '', location.pathname + (params.toString() ? '?' + params : ''));
  } else {
    _authToken = sessionStorage.getItem('sp_token') || '';
  }
})();

function _authHeaders(opts = {}) {
  if (!_authToken) return opts;
  const h = new Headers(opts.headers || {});
  h.set('Authorization', 'Bearer ' + _authToken);
  return {...opts, headers: h};
}

// Period selector
document.getElementById('period-bar').addEventListener('click', e => {
  const btn = e.target.closest('.period-btn');
  if (!btn) return;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPeriod = parseInt(btn.dataset.period);
  historyVisible = PAGE_SIZE;
  poll();
});

function fmtDuration(ms) {
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  return (ms / 60000).toFixed(1) + 'm';
}

function fmtUptime(s) {
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  return h + 'h ' + m + 'm';
}

function fmtAgo(ts) {
  const ago = (Date.now() / 1000) - ts;
  if (ago < 60) return Math.floor(ago) + 's ago';
  if (ago < 3600) return Math.floor(ago / 60) + 'm ago';
  if (ago < 86400) return Math.floor(ago / 3600) + 'h ago';
  return Math.floor(ago / 86400) + 'd ago';
}

function parseActive(r) {
  // MCP active requests use "description" field (tool:model format)
  // Playground active requests use separate tool/model fields
  if (r.tool) return { tool: r.tool, model: r.model };
  const parts = (r.description || '').split(':');
  return { tool: parts[0] || '', model: parts.slice(1).join(':') || '' };
}

function render(data) {
  lastData = data;

  // Stats
  document.getElementById('s-requests').textContent = data.total;
  const errEl = document.getElementById('s-errors');
  errEl.textContent = data.errors;
  errEl.classList.toggle('has-errors', data.errors > 0);
  document.getElementById('s-uptime').textContent = fmtUptime(data.server_uptime_s);

  // Active requests
  const activeEl = document.getElementById('active-list');
  if (data.active.length === 0) {
    activeEl.innerHTML = '<div class="empty-state">No active requests</div>';
  } else {
    activeEl.innerHTML = data.active.map(r => {
      const p = parseActive(r);
      const color = r.backend === 'ollama' ? 'var(--green)' : 'var(--accent)';
      const src = r.source === 'playground' ? 'playground' : 'mcp';
      return `<div class="active-card">
        <div class="active-dot" style="background:${color}"></div>
        <div class="active-info">
          <div class="active-desc">${esc(p.tool)}</div>
          <div class="active-meta">${esc(p.model)} <span class="backend-tag backend-${r.backend}">${r.backend}</span> <span class="source-tag source-${src}">${src}</span></div>
        </div>
        <div class="active-elapsed">${fmtDuration(r.elapsed_ms)}</div>
      </div>`;
    }).join('');
  }

  // Tool breakdown
  const toolBars = document.getElementById('tool-bars');
  const stats = data.tool_stats || [];
  if (stats.length === 0) {
    toolBars.innerHTML = '<div class="empty-state" style="padding:16px">No requests yet</div>';
  } else {
    const maxCount = stats[0].count;
    toolBars.innerHTML = stats.map(s => {
      const pct = (s.count / maxCount) * 100;
      return `<div class="tool-row">
        <div class="tool-name">${esc(s.tool)}</div>
        <div class="tool-bar-wrap"><div class="tool-bar" style="width:${pct}%"></div></div>
        <div class="tool-meta">
          <span class="count">${s.count} req${s.count !== 1 ? 's' : ''}</span>
          <span class="avg">avg ${fmtDuration(s.avg_ms)}</span>
        </div>
      </div>`;
    }).join('');
  }

  // History table (paged)
  renderHistory(data.history);
}

function renderHistory(history) {
  const tbody = document.getElementById('history-body');
  const showMore = document.getElementById('show-more');
  if (!history || history.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text3)">No requests in this period</td></tr>';
    showMore.style.display = 'none';
    return;
  }
  const visible = history.slice(0, historyVisible);
  tbody.innerHTML = visible.map(r => {
    const statusCls = r.status === 'ok' ? 'status-ok' : 'status-error';
    const statusIcon = r.status === 'ok' ? '\u2713' : '\u2717';
    const title = r.error_msg ? ` title="${esc(r.error_msg)}"` : '';
    return `<tr>
      <td>${esc(r.tool)}</td>
      <td title="${esc(r.model)}">${esc(r.model)}</td>
      <td><span class="backend-tag backend-${r.backend}">${r.backend}</span></td>
      <td class="${statusCls}"${title}>${statusIcon}</td>
      <td class="dur">${fmtDuration(r.duration_ms)}</td>
      <td>${fmtAgo(r.completed_at)}</td>
    </tr>`;
  }).join('');
  const remaining = history.length - historyVisible;
  if (remaining > 0) {
    showMore.textContent = `Show more (${remaining} remaining)`;
    showMore.style.display = 'block';
  } else {
    showMore.style.display = 'none';
  }
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function poll() {
  try {
    const resp = await fetch(`/api/activity?period=${currentPeriod}`, _authHeaders());
    if (resp.ok) render(await resp.json());
  } catch {}
}

// Update elapsed times between polls
setInterval(() => {
  if (!lastData || lastData.active.length === 0) return;
  const now = Date.now() / 1000;
  document.querySelectorAll('.active-elapsed').forEach((el, i) => {
    if (lastData.active[i]) {
      const ms = Math.round((now - lastData.active[i].started) * 1000);
      el.textContent = fmtDuration(ms);
    }
  });
}, 1000);

document.getElementById('show-more').addEventListener('click', () => {
  historyVisible += PAGE_SIZE;
  if (lastData) renderHistory(lastData.history || []);
});

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
