<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Puppy — Model Profiles</title>
<style>
:root {
  --bg: #f5f5f7; --surface: #fff; --surface2: #f0f0f2;
  --text: #1d1d1f; --text2: #86868b; --text3: #aeaeb2;
  --border: #d2d2d7; --accent: #007aff;
  --green: #34c759; --amber: #ff9f0a; --red: #ff3b30;
  --r: 12px; --rs: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000; --surface: #1c1c1e; --surface2: #2c2c2e;
    --text: #f5f5f7; --text2: #98989d; --text3: #636366;
    --border: #38383a;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font: 14px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  padding: 24px 32px; max-width: 960px; margin: 0 auto;
  -webkit-font-smoothing: antialiased;
}
nav {
  display: none; gap: 4px; margin-bottom: 24px;
  border-bottom: 1px solid var(--border); padding-bottom: 12px;
}
@media (max-width: 600px) { nav { display: flex; } }
@media (display-mode: standalone) { nav { display: flex; } }
nav a {
  padding: 6px 16px; border-radius: 20px; text-decoration: none;
  color: var(--text2); font-size: 13px; font-weight: 500;
  transition: all 0.15s;
}
nav a:hover { color: var(--text); background: var(--surface2); }
nav a.active { color: #fff; background: var(--accent); }
.header { margin-bottom: 24px; }
.header p { color: var(--text2); }

/* Profiles */
.profiles { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
.prof-btn {
  padding: 7px 18px; border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text); font: inherit; font-size: 13px;
  cursor: pointer; transition: all 0.15s;
}
.prof-btn:hover { border-color: var(--accent); color: var(--accent); }
.prof-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.prof-btn.go {
  margin-left: auto; background: var(--green); color: #fff; border-color: var(--green); font-weight: 600;
}
.prof-btn.warm {
  margin-left: auto; background: var(--amber); color: #fff; border-color: var(--amber);
  font-weight: 600; box-shadow: 0 1px 4px rgba(255,159,10,0.3);
}
.prof-btn.warm:hover { opacity: 0.85; }
.prof-btn.go:hover { opacity: 0.85; }
.prof-btn:disabled { opacity: 0.4; pointer-events: none; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
  vertical-align: middle; margin-right: 6px; }

/* Memory */
.mem-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  padding: 16px 20px; margin-bottom: 24px;
}
.mem-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
.mem-top h2 { font-size: 15px; font-weight: 600; }
.mem-top span { font-size: 13px; color: var(--text2); }
.mem-bar {
  height: 32px; background: var(--surface2); border-radius: 8px;
  display: flex; position: relative; overflow: hidden;
}
.mem-seg {
  height: 100%; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; color: #fff; min-width: 3px;
  transition: width 0.4s ease; overflow: hidden;
}
.mem-seg span { white-space: nowrap; padding: 0 6px; }
.mem-bar-limit {
  position: absolute; top: 0; bottom: 0; width: 2px;
  background: var(--red); z-index: 2; display: none;
}
.mem-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; }
.mem-legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
.mem-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

/* Task rows (collapsible) */
.task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.task-row {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  overflow: hidden;
}
.task-header {
  display: flex; align-items: center; padding: 10px 14px; cursor: pointer;
  user-select: none; gap: 10px;
}
.task-header:hover { background: var(--surface2); }
.task-color { width: 4px; height: 24px; border-radius: 2px; flex-shrink: 0; }
.task-label { font-size: 13px; font-weight: 600; flex: 1; }
.task-selected { font-size: 12px; color: var(--text2); }
.task-chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
.task-row.open .task-chevron { transform: rotate(90deg); }
.task-body { display: none; padding: 4px 14px 10px; }
.task-row.open .task-body { display: block; }
.card {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: var(--rs); margin-bottom: 4px;
  border: 1.5px solid transparent; cursor: pointer; transition: all 0.12s;
  background: var(--surface2);
}
.card:hover { border-color: var(--accent); }
.card.selected { border-color: var(--accent); background: rgba(0,122,255,0.06); }
.card-body { flex: 1; min-width: 0; }
.card-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { font-size: 11px; color: var(--text2); margin-top: 1px; }
.badge {
  font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 4px;
  flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px;
}
.badge.default { background: rgba(52,199,89,0.12); color: var(--green); }
.badge.active-badge { background: rgba(0,122,255,0.12); color: var(--accent); }
.card.too-large { opacity: 0.35; cursor: not-allowed; }
.card.too-large:hover { border-color: transparent; }
.task-selected.stale { color: var(--red); }
.task-selected.stale::before { content: '\26A0  '; }
.think-toggle {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text3); cursor: pointer; transition: all 0.15s;
  flex-shrink: 0;
}
.think-toggle.on { background: rgba(175,82,222,0.12); color: #af52de; border-color: #af52de; }
.think-toggle:hover { border-color: var(--accent); }
.footer { text-align: center; color: var(--text3); font-size: 11px; margin-top: 24px; }
.refresh-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
  padding: 2px 8px; color: var(--text3); cursor: pointer; font-size: 11px; margin-left: 8px; }
.refresh-btn:hover { border-color: var(--accent); color: var(--text2); }

/* ── Pull modal ── */
.pull-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.pull-modal {
  background: var(--surface); border-radius: var(--r); padding: 24px;
  max-width: 480px; width: 90%; max-height: 80dvh; display: flex; flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.pull-modal h3 { margin-bottom: 12px; font-size: 16px; flex-shrink: 0; }
.pull-modal p { color: var(--text2); font-size: 13px; margin-bottom: 16px; flex-shrink: 0; }
.pull-list { list-style: none; margin-bottom: 16px; overflow-y: auto; flex: 1; min-height: 0; }
.pull-list li {
  padding: 8px 12px; border-radius: var(--rs); margin-bottom: 4px;
  background: var(--surface2); font-size: 13px;
  display: flex; align-items: center; justify-content: space-between;
}
.pull-list .status { font-size: 12px; color: var(--text3); }
.pull-list .status.pulling { color: var(--accent); }
.pull-list .status.done { color: var(--green); }
.pull-list .status.error { color: var(--red); }
.pull-progress {
  height: 4px; background: var(--surface2); border-radius: 2px;
  margin-top: 4px; overflow: hidden;
}
.pull-progress-bar {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width 0.3s ease; width: 0%;
}
.pull-actions { display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }
.pull-actions button {
  padding: 8px 20px; border-radius: 20px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 600;
}
.pull-actions .pull-go { background: var(--accent); color: #fff; }
.pull-actions .pull-go:disabled { opacity: 0.5; cursor: default; }
.pull-actions .pull-skip { background: var(--surface2); color: var(--text2); }
</style>
</head>
<body>

<nav>
  <a href="/profiles" class="active">Profiles</a>
  <a href="/tools">Playground</a>
  <a href="/activity">Activity</a>
</nav>

<div class="header">
  <p id="subtitle">Loading...</p>
</div>
<div class="profiles" id="profiles"></div>
<div class="mem-box">
  <div class="mem-top"><h2>Memory</h2><span id="mem-usage"></span></div>
  <div class="mem-bar" id="mem-bar"></div>
  <div class="mem-legend" id="mem-legend"></div>
</div>
<div class="task-list" id="tasks"></div>
<div class="footer" id="footer"></div>

<script>
const TC = {
  code:'#007aff', general:'#34c759', reasoning:'#af52de',
  long_context:'#5ac8fa', translation:'#ff9f0a',
  vision:'#ff2d55', image_gen:'#ffd60a', transcription:'#ac8e68',
  tts:'#30b0c7', image_edit:'#e88a3f', embedding:'#64d2ff',
  unfiltered:'#ff6b6b', computer_use:'#b388ff',
};
const TASK_ORDER = ['code','general','reasoning','long_context','translation','vision','computer_use','image_gen','image_edit','transcription','tts','embedding','unfiltered'];

let S = { sys:null, models:[], tasks:{}, profiles:{active:null,profiles:{}},
           sel:null, picks:{}, thinkPicks:{}, openTasks:new Set(), dirty:false };

const fmt = b => b>=1e12?(b/1e12).toFixed(1)+'TB':b>=1e9?Math.round(b/1e9)+'GB':b>=1e6?Math.round(b/1e6)+'MB':b+'B';
const fmtP = (t,a) => t===a||!a ? t+'B' : t+'B/'+a+'B';
const fmtC = c => c>=1e6?Math.round(c/1e6)+'M':c>=1024?Math.floor(c/1024)+'K':c>0?''+c:'';
const findModel = name => S.models.find(m => m.name === name) || S.models.find(m => m.name.startsWith(name + ':'));

let _authToken = '';

async function _initAuth() {
  const params = new URLSearchParams(location.search);
  if (params.has('token')) {
    _authToken = params.get('token');
    sessionStorage.setItem('sp_token', _authToken);
    params.delete('token');
    const clean = params.toString();
    history.replaceState(null, '', location.pathname + (clean ? '?' + clean : ''));
    return;
  }
  const stored = sessionStorage.getItem('sp_token');
  if (stored) { _authToken = stored; return; }
  try {
    const r = await fetch('/api/auth-token');
    if (r.ok) { _authToken = (await r.json()).token || ''; }
  } catch {}
}

function _authHeaders(opts = {}) {
  if (!_authToken) return opts;
  const h = opts.headers instanceof Headers ? opts.headers : new Headers(opts.headers || {});
  h.set('Authorization', 'Bearer ' + _authToken);
  return {...opts, headers: h};
}

function _fetch(url) {
  const ctrl = new AbortController();
  setTimeout(() => ctrl.abort(), 15000);
  return fetch(url, _authHeaders({signal: ctrl.signal})).then(r => r.json());
}

async function init() {
  await _initAuth();
  let sys, tasks, profiles;
  const sub = document.getElementById('subtitle');
  try {
    sub.innerHTML = '<span class="spinner"></span>Loading config…';
    [sys,tasks,profiles] = await Promise.all([
      _fetch('/api/system'), _fetch('/api/tasks'), _fetch('/api/profiles'),
    ]);
    Object.assign(S, {sys,tasks,profiles});
    sub.innerHTML = '<span class="spinner"></span>Discovering models…';
    S.models = await _fetch('/api/models');
  } catch (err) {
    sub.innerHTML = `Error: ${err.name}: ${err.message} — <a href="#" onclick="init();return false" style="color:var(--accent)">retry</a>`;
    return;
  }
  S.sel = profiles.active || Object.keys(profiles.profiles)[0] || null;
  if (S.sel) {
    const p = S.profiles.profiles[S.sel];
    if (p?.tasks) S.picks = {...p.tasks};
    if (p?.thinking) S.thinkPicks = {...p.thinking};
  }
  fillThinkDefaults();
  fillDefaults();
  render();
  // Check for missing models (e.g. after a version bump updated defaults)
  // Skip if profile needs more RAM than this machine has — can't run them locally
  if (profiles.missing?.length) {
    const p = S.sel ? S.profiles.profiles[S.sel] : null;
    const ramGB = S.sys?.total_ram_gb || 0;
    const profileRAM = p?.max_ram_gb || 0;
    if (!profileRAM || !ramGB || profileRAM <= ramGB) {
      showPullModal(profiles.missing);
    }
  }
}

window.addEventListener('beforeunload', (e) => {
  if (S.dirty) { e.preventDefault(); }
});

async function refreshModels() {
  const [sys, models] = await Promise.all([
    fetch('/api/system', _authHeaders()).then(r=>r.json()),
    fetch('/api/models?refresh=1', _authHeaders()).then(r=>r.json()),
  ]);
  S.sys = sys;
  S.models = models;
  render();
}

function switchToCustom() {
  if (S.sel === 'custom') return;
  if (!S.profiles.profiles.custom) {
    S.profiles.profiles.custom = { label: 'Custom', description: 'Your custom configuration', tasks: {}, thinking: {} };
  }
  S.profiles.profiles.custom.tasks = {...S.picks};
  S.profiles.profiles.custom.thinking = {...S.thinkPicks};
  S.sel = 'custom';
  S.dirty = true;
}

function fillThinkDefaults() {
  for (const [key, info] of Object.entries(S.tasks)) {
    if (S.thinkPicks[key] === undefined) {
      S.thinkPicks[key] = info.thinking !== undefined ? info.thinking : true;
    }
  }
}

function fillDefaults() {
  // Only fill defaults for the Custom profile (user is building from scratch).
  // Preset profiles intentionally omit tasks that don't fit in their RAM budget.
  const isPreset = S.sel && S.sel !== 'custom';
  if (isPreset) return;
  for (const [key, info] of Object.entries(S.tasks)) {
    if (S.picks[key]) continue;
    for (const pref of (info.defaults||[])) {
      const found = findModel(pref);
      if (found) { S.picks[key] = found.name; break; }
    }
    if (!S.picks[key] && info.prefixes) {
      for (const m of S.models) {
        if (info.prefixes.some(p => m.name.startsWith(p))) { S.picks[key] = m.name; break; }
      }
    }
  }
}

function render() {
  const modeLabel = {server: 'Server', client: 'Client', offline: 'Offline'}[S.sys?.mode] || '';
  document.getElementById('subtitle').textContent =
    S.sys ? `${modeLabel} · ${S.sys.total_ram_gb}GB unified memory · ${S.models.length} models` : '';
  renderProfiles();
  renderMemory();
  renderTasks();
  const footer = document.getElementById('footer');
  footer.innerHTML = `Updated ${new Date().toLocaleTimeString()} <button class="refresh-btn" onclick="refreshModels()">Refresh</button>`;
}

function renderProfiles() {
  const el = document.getElementById('profiles');
  el.innerHTML = '';
  const profs = S.profiles.profiles;
  const order = Object.keys(profs).sort((a,b) => {
    if (a === 'custom') return 1;
    if (b === 'custom') return -1;
    return (profs[a].max_ram_gb || 0) - (profs[b].max_ram_gb || 0);
  });
  for (const name of order) {
    const p = S.profiles.profiles[name];
    const b = document.createElement('button');
    b.className = 'prof-btn' + (S.sel===name?' active':'');
    b.textContent = p.label || name;
    b.title = p.description || '';
    b.onclick = () => { S.sel = name; S.dirty = false; S._warmed = false; S.picks = {...(p.tasks||{})}; S.thinkPicks = {...(p.thinking||{})}; fillThinkDefaults(); fillDefaults(); render(); };
    el.appendChild(b);
  }
  const isActive = S.sel === S.profiles.active;
  if (S.sel && (!isActive || S.dirty)) {
    const b = document.createElement('button');
    b.className = 'prof-btn go';
    b.textContent = S.dirty && isActive ? 'Save Changes' : 'Activate';
    b.onclick = () => activate(S.sel);
    el.appendChild(b);
  }
  if (S.sel && isActive) {
    const b = document.createElement('button');
    b.className = 'prof-btn warm';
    if (S._warmed) {
      b.textContent = 'Loaded \u2713';
      b.disabled = true;
    } else {
      b.textContent = 'Pre-load Models';
      b.title = 'Load preferred models into memory so they respond instantly';
      b.onclick = () => warm(S.sel);
    }
    el.appendChild(b);
  }
}

function renderMemory() {
  const bar = document.getElementById('mem-bar');
  const legend = document.getElementById('mem-legend');
  const usage = document.getElementById('mem-usage');
  bar.innerHTML = ''; legend.innerHTML = '';

  const sysRam = S.sys?.total_ram_bytes || 512*(1<<30);
  // Use profile's target RAM if available, otherwise system RAM
  const profile = S.sel && S.profiles?.profiles?.[S.sel];
  const targetRamGb = profile?.max_ram_gb || Math.round(sysRam / (1<<30));
  const targetRam = targetRamGb * (1<<30);

  const seen = new Set();
  const segs = [];
  for (const task of TASK_ORDER) {
    const pick = S.picks[task];
    if (!pick) continue;
    const m = findModel(pick);
    if (!m || seen.has(m.name)) continue;
    seen.add(m.name);
    segs.push({ name: m.name, bytes: m.vram_bytes || m.disk_bytes,
                color: TC[task] || '#888', task });
  }

  const totalUsed = segs.reduce((s,x) => s + x.bytes, 0);
  const overflows = totalUsed > targetRam;
  const barMax = overflows ? totalUsed : targetRam;

  usage.textContent = fmt(totalUsed) + ' / ' + targetRamGb + 'GB';
  usage.style.color = overflows ? 'var(--red)' : '';

  segs.forEach(seg => {
    const pct = (seg.bytes / barMax) * 100;
    const d = document.createElement('div');
    d.className = 'mem-seg';
    d.style.width = Math.max(pct, 0.8) + '%';
    d.style.background = seg.color;
    d.innerHTML = pct > 5 ? `<span>${seg.name.split(':')[0]}</span>` : '';
    d.title = `${seg.name}: ${fmt(seg.bytes)}`;
    bar.appendChild(d);

    const li = document.createElement('span');
    li.className = 'mem-legend-item';
    li.innerHTML = `<span class="mem-dot" style="background:${seg.color}"></span>${seg.name.split(':')[0]} · ${fmt(seg.bytes)}`;
    legend.appendChild(li);
  });

  if (overflows) {
    const limit = document.createElement('div');
    limit.className = 'mem-bar-limit';
    limit.style.display = 'block';
    limit.style.left = ((targetRam / barMax) * 100) + '%';
    bar.appendChild(limit);
  } else {
    const freePct = ((targetRam - totalUsed) / barMax) * 100;
    if (freePct > 0.5) {
      const free = document.createElement('div');
      free.className = 'mem-seg';
      free.style.width = freePct + '%';
      free.style.background = 'var(--surface2)';
      free.style.color = 'var(--text3)';
      if (freePct > 10) free.innerHTML = `<span>${fmt(targetRam - totalUsed)} free</span>`;
      bar.appendChild(free);
    }
  }
}

function renderTasks() {
  const el = document.getElementById('tasks');
  el.innerHTML = '';

  for (const key of TASK_ORDER) {
    const info = S.tasks[key];
    if (!info) continue;
    const color = TC[key] || '#888';
    const picked = S.picks[key];

    let def = null;
    for (const pref of (info.defaults||[])) {
      const f = findModel(pref);
      if (f) { def = f.name; break; }
    }
    if (!def && info.prefixes) {
      for (const m of S.models) {
        if (info.prefixes.some(p => m.name.startsWith(p))) { def = m.name; break; }
      }
    }

    const eligible = S.models
      .filter(m => m.eligible_tasks?.includes(key))
      .sort((a,b) => b.total_params_b - a.total_params_b);

    const isPreset = S.sel && S.sel !== 'custom';
    const selectedName = picked || (isPreset ? null : def);
    const selectedLabel = selectedName ? selectedName.split(':')[0] : 'none';
    const isStale = selectedName && !findModel(selectedName);

    const row = document.createElement('div');
    row.className = 'task-row' + (S.openTasks.has(key) ? ' open' : '');

    const think = S.thinkPicks[key] !== false;
    row.innerHTML = `
      <div class="task-header" data-task="${key}">
        <div class="task-color" style="background:${color}"></div>
        <div class="task-label">${info.label}</div>
        <div class="task-selected${isStale ? ' stale' : ''}">${selectedLabel}</div>
        <div class="think-toggle ${think ? 'on' : ''}" data-key="${key}">think</div>
        <div class="task-chevron">&#9654;</div>
      </div>
      <div class="task-body"></div>
    `;

    row.querySelector('.think-toggle').onclick = (e) => {
      e.stopPropagation();
      switchToCustom();
      S.thinkPicks[key] = !think;
      S.dirty = true;
      render();
    };
    row.querySelector('.task-header').onclick = () => {
      if (S.openTasks.has(key)) S.openTasks.delete(key);
      else S.openTasks.add(key);
      render();
    };

    const body = row.querySelector('.task-body');
    const ram = S.sys?.total_ram_bytes || 512*(1<<30);

    for (const m of eligible) {
      const isSelected = m.name === selectedName;
      const isDef = m.name === def;
      const tooLarge = (m.vram_bytes || m.disk_bytes) > ram;

      const card = document.createElement('div');
      card.className = 'card' + (isSelected?' selected':'') + (tooLarge?' too-large':'');

      if (!tooLarge) {
        card.onclick = () => { switchToCustom(); S.picks[key] = m.name; S.dirty = true; render(); };
      }

      let badges = '';
      if (isDef && !isSelected) badges += '<span class="badge default">Default</span>';
      if (isSelected) badges += '<span class="badge active-badge">Active</span>';

      const meta = [fmtP(m.total_params_b, m.active_params_b)];
      const ctx = fmtC(m.context);
      if (ctx) meta.push(ctx + ' ctx');
      if (m.has_vision) meta.push('vision');
      meta.push(m.backend);
      if (tooLarge) meta.push('exceeds RAM');

      card.innerHTML = `
        <div class="card-body">
          <div class="card-name">${m.name}</div>
          <div class="card-meta">${meta.join(' · ')}</div>
        </div>
        ${badges}
      `;
      body.appendChild(card);
    }

    el.appendChild(row);
  }
}

async function activate(name) {
  const btn = document.querySelector('.prof-btn.go');
  if (btn) { btn.disabled = true; btn.textContent = 'Activating...'; }
  try {
    const p = S.profiles.profiles[name];
    if (p) { p.tasks = {...S.picks}; p.thinking = {...S.thinkPicks}; }
    await fetch('/api/profiles', _authHeaders({
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, ...p}),
    }));
    const actResp = await fetch(`/api/profiles/${name}/activate`, _authHeaders({method:'POST'}));
    const actData = await actResp.json();
    S.profiles.active = name;
    S.dirty = false;
    render();
    if (actData.warnings?.length) {
      console.warn('Stale model references:', actData.warnings);
    }
    if (actData.missing?.length) {
      const ramGB = S.sys?.total_ram_gb || 0;
      const profileRAM = p?.max_ram_gb || 0;
      if (profileRAM && ramGB && profileRAM > ramGB) {
        console.warn(`Skipping pull modal: profile needs ${profileRAM}GB, machine has ${ramGB}GB`);
      } else {
        showPullModal(actData.missing);
      }
    }
    if (window.webkit?.messageHandlers?.app)
      window.webkit.messageHandlers.app.postMessage('profileChanged');
  } catch(e) { alert('Failed: '+e.message); }
}

function showPullModal(models) {
  // models: [{name, size_gb}, ...] or ["name", ...] (backwards compat)
  const items = models.map(m => typeof m === 'string' ? {name: m, size_gb: null} : m);
  const totalGB = items.reduce((s, m) => s + (m.size_gb || 0), 0);
  const sizeNote = totalGB > 0 ? ` (~${fmtSize(totalGB)} total)` : '';
  const overlay = document.createElement('div');
  overlay.className = 'pull-overlay';
  overlay.innerHTML = `
    <div class="pull-modal">
      <h3>Missing Models</h3>
      <p>${items.length} model${items.length > 1 ? 's' : ''} not yet installed${sizeNote}:</p>
      <ul class="pull-list">
        ${items.map((m, i) => `<li data-idx="${i}">
          <span class="name">${esc(m.name)}${m.size_gb != null ? ` <small style="color:var(--text3)">${fmtSize(m.size_gb)}</small>` : ''}</span>
          <span class="status">waiting</span>
        </li>`).join('')}
      </ul>
      <div class="pull-actions">
        <button class="pull-skip">Skip</button>
        <button class="pull-go" id="pull-go-btn">Pull All</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.pull-skip').onclick = () => overlay.remove();
  const names = items.map(m => m.name);
  overlay.querySelector('#pull-go-btn').onclick = () => doPull(names, overlay);
}

async function doPull(models, overlay) {
  const goBtn = overlay.querySelector('#pull-go-btn');
  const skipBtn = overlay.querySelector('.pull-skip');
  goBtn.disabled = true;
  goBtn.textContent = 'Pulling...';
  skipBtn.style.display = 'none';

  const items = overlay.querySelectorAll('.pull-list li');

  try {
    const resp = await fetch('/api/models/pull', _authHeaders({
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({models}),
    }));
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(line.slice(6));
          if (d.status === 'done') {
            goBtn.remove();
            skipBtn.style.display = '';
            skipBtn.textContent = 'Close';
            await refreshModels();
            return;
          }
          if (d.index !== undefined && items[d.index]) {
            const statusEl = items[d.index].querySelector('.status');
            if (d.error) {
              statusEl.className = 'status error';
              statusEl.textContent = 'failed';
            } else if (d.status === 'success') {
              statusEl.className = 'status done';
              statusEl.textContent = '\u2713';
            } else if (d.status === 'pulling') {
              statusEl.className = 'status pulling';
              statusEl.textContent = 'pulling...';
            } else if (d.completed !== undefined && d.total) {
              statusEl.className = 'status pulling';
              const pct = Math.round((d.completed / d.total) * 100);
              const gb = (d.total / 1e9).toFixed(1);
              statusEl.textContent = `${pct}% of ${gb} GB`;
            }
          }
        } catch {}
      }
    }
  } catch (e) {
    goBtn.textContent = 'Failed';
    goBtn.disabled = false;
    skipBtn.style.display = '';
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtSize(gb) {
  if (gb < 0.1) return Math.round(gb * 1000) + ' MB';
  if (gb < 1) return (gb * 1000).toFixed(0) + ' MB';
  return gb.toFixed(1) + ' GB';
}

async function warm(name) {
  const btn = document.querySelector('.prof-btn.warm');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Loading'; }
  try {
    const resp = await fetch(`/api/profiles/${name}/warm`, {method:'POST'});
    const data = await resp.json();
    S._warmed = true;
    if (btn) {
      btn.innerHTML = data.loaded?.length ? `Loaded ${data.loaded.length}` : 'Already loaded';
      setTimeout(() => render(), 1500);
    }
  } catch(e) { alert('Failed: '+e.message); }
}

init();
</script>
