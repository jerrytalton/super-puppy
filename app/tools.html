<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Super Puppy — Playground</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/pwa/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
<style>
:root {
  --bg: #f5f5f7; --surface: #fff; --surface2: #f0f0f2;
  --text: #1d1d1f; --text2: #86868b; --text3: #aeaeb2;
  --border: #d2d2d7; --accent: #007aff;
  --green: #34c759; --red: #ff3b30;
  --r: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000; --surface: #1c1c1e; --surface2: #2c2c2e;
    --text: #f5f5f7; --text2: #98989d; --text3: #636366;
    --border: #38383a;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  padding: 24px 32px; max-width: 720px; margin: 0 auto;
  -webkit-font-smoothing: antialiased;
}
nav {
  display: none; gap: 4px; margin-bottom: 24px;
  border-bottom: 1px solid var(--border); padding-bottom: 12px;
}
@media (max-width: 600px) { nav { display: flex; } }
@media (display-mode: standalone) { nav { display: flex; } }
nav a {
  padding: 6px 16px; border-radius: 20px; text-decoration: none;
  color: var(--text2); font-size: 13px; font-weight: 500;
  transition: all 0.15s;
}
nav a:hover { color: var(--text); background: var(--surface2); }
nav a.active { color: #fff; background: var(--accent); }
h2 { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase;
     letter-spacing: 0.5px; margin-bottom: 8px; }

.tool-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.tool-btn {
  padding: 6px 14px; border-radius: 16px; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text); font: inherit; font-size: 12px;
  cursor: pointer; transition: all 0.15s;
}
.tool-btn:hover { border-color: var(--accent); color: var(--accent); }
.tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.field input, .field textarea, .field select {
  width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font: inherit; font-size: 13px;
}
.field textarea { height: 80px; resize: vertical; }
.field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }

.run-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.run-btn {
  padding: 8px 24px; border-radius: 8px; border: none;
  background: var(--accent); color: #fff; font: inherit; font-size: 13px;
  font-weight: 600; cursor: pointer;
}
.run-btn:hover { opacity: 0.85; }
.run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.status { font-size: 12px; color: var(--text2); }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
  vertical-align: middle; margin-right: 6px; }

.output-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  padding: 14px 16px; min-height: 100px; font-size: 13px; white-space: pre-wrap;
  word-break: break-word; color: var(--text);
}
.output-box.error { border-color: var(--red); color: var(--red); }
.output-box img { max-width: 100%; border-radius: 8px; margin-top: 8px; }

.mic-row { display: flex; align-items: center; gap: 10px; }
.mic-btn {
  padding: 6px 16px; border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text); font: inherit; font-size: 12px;
  cursor: pointer; transition: all 0.15s;
}
.mic-btn.recording { background: var(--red); color: #fff; border-color: var(--red); }
.mic-time { font-size: 12px; color: var(--text2); font-variant-numeric: tabular-nums; }

/* Model picker (matches profile viewer cards) */
.model-picker {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  margin-bottom: 12px; overflow: hidden;
}
.model-picker-header {
  display: flex; align-items: center; padding: 10px 14px; cursor: pointer;
  user-select: none; gap: 10px;
}
.model-picker-header:hover { background: var(--surface2); }
.model-picker-label { font-size: 13px; font-weight: 600; }
.model-picker-selected { font-size: 12px; color: var(--text2); flex: 1; text-align: right; }
.model-picker-chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
.model-picker.open .model-picker-chevron { transform: rotate(90deg); }
.model-picker-body { display: none; padding: 4px 14px 10px; max-height: 240px; overflow-y: auto; }
.model-picker.open .model-picker-body { display: block; }
.card {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: 8px; margin-bottom: 4px;
  border: 1.5px solid transparent; cursor: pointer; transition: all 0.12s;
  background: var(--surface2);
}
.card:hover { border-color: var(--accent); }
.card.selected { border-color: var(--accent); background: rgba(0,122,255,0.06); }
.card .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--text3); }
.card.loaded .dot { background: var(--green); }
.card-body { flex: 1; min-width: 0; }
.card-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { font-size: 11px; color: var(--text2); margin-top: 1px; }
.badge {
  font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 4px;
  flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px;
}
.badge.profile-badge { background: rgba(0,122,255,0.12); color: var(--accent); }
.badge.default { background: rgba(52,199,89,0.12); color: var(--green); }
.think-toggle {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text3); cursor: pointer; transition: all 0.15s;
  flex-shrink: 0; margin-left: 8px;
}
.think-toggle.on { background: rgba(175,82,222,0.12); color: #af52de; border-color: #af52de; }
.think-toggle:hover { border-color: var(--accent); }

.output-box.running { animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { border-color: var(--border); }
  50% { border-color: var(--accent); }
}
.elapsed { font-variant-numeric: tabular-nums; }

/* Mobile responsive */
@media (max-width: 600px) {
  body { padding: 16px; padding-top: calc(16px + env(safe-area-inset-top)); padding-bottom: calc(16px + env(safe-area-inset-bottom)); min-height: 100dvh; }
  h1 { font-size: 20px; }
  h2 { font-size: 15px; }
  .tool-btn { padding: 10px 14px; font-size: 13px; }
  .run-btn { width: 100%; padding: 12px; }
  .run-row { flex-wrap: wrap; }
  .field textarea { min-height: 100px; }
  .output-box { font-size: 13px; max-height: 50dvh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .model-picker-body { max-height: 40dvh; -webkit-overflow-scrolling: touch; }
  button, .tool-btn, .run-btn, .think-toggle { touch-action: manipulation; }
}
</style>
</head>
<body>

<nav>
  <a href="/profiles">Profiles</a>
  <a href="/tools" class="active">Playground</a>
  <a href="/activity">Activity</a>
</nav>

<h2>Tool</h2>
<div class="tool-grid" id="tool-grid"></div>
<div id="fields"></div>
<div class="model-picker" id="model-picker">
  <div class="model-picker-header" id="model-picker-header">
    <div class="model-picker-label">Model</div>
    <div class="model-picker-selected" id="model-picker-selected">Loading...</div>
    <div class="think-toggle" id="think-toggle">think</div>
    <div class="model-picker-chevron">&#9654;</div>
  </div>
  <div class="model-picker-body" id="model-picker-body"></div>
</div>
<div class="run-row">
  <button class="run-btn" id="run" onclick="run()">Run</button>
  <button class="run-btn" id="cancel-btn" onclick="cancel()" style="background:#888;display:none">Cancel</button>
  <span class="status" id="status"></span>
  <span id="log" style="font-size:11px; color:var(--text3); font-family:ui-monospace,monospace; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; flex:1; min-width:0;"></span>
</div>
<h2>Output</h2>
<div class="output-box" id="output">Select a tool and click Run.</div>

<script>
const TOOLS = {
  code:        { label: 'Code', task: 'code', fields: [
    {id:'prompt', label:'Prompt', type:'textarea', placeholder:'Write a Python function that...'},
  ]},
  general:     { label: 'General', task: 'general', fields: [
    {id:'prompt', label:'Prompt', type:'textarea', placeholder:'Explain, summarize, brainstorm...'},
  ]},
  review:      { label: 'Review', task: 'reasoning', fields: [
    {id:'code', label:'Code', type:'textarea', placeholder:'Paste code to review...'},
  ]},
  vision:      { label: 'Vision', task: 'vision', fields: [
    {id:'image_path', label:'Image', type:'file', accept:'image/*'},
    {id:'screenshot', label:'Or screenshot', type:'screenshot'},
    {id:'prompt', label:'Prompt', type:'text', placeholder:'Describe what you see', value:'Describe what you see in this image.'},
  ]},
  computer_use:{ label: 'Computer Use', task: 'computer_use', fields: [
    {id:'image_path', label:'Screenshot', type:'file', accept:'image/*'},
    {id:'screenshot', label:'Or screenshot', type:'screenshot'},
    {id:'intent', label:'Intent', type:'textarea', placeholder:'Click the Submit button...'},
  ]},
  image_gen:   { label: 'Image Gen', task: 'image_gen', fields: [
    {id:'prompt', label:'Prompt', type:'textarea', placeholder:'A cat wearing a space helmet...'},
  ]},
  image_edit:  { label: 'Image Edit', task: 'image_edit', fields: [
    {id:'image_path', label:'Image', type:'file', accept:'image/*'},
    {id:'prompt', label:'Edit prompt', type:'textarea', placeholder:'Make the background blue...'},
  ]},
  speak:       { label: 'Speak', task: 'tts', fields: [
    {id:'text', label:'Text', type:'textarea', placeholder:'Hello! This is a test of text-to-speech.'},
    {id:'voice', label:'Voice', type:'select', options: [
      'casual_male', 'casual_female', 'cheerful_female', 'neutral_male', 'neutral_female',
      'fr_male', 'fr_female', 'es_male', 'es_female', 'de_male', 'de_female',
      'it_male', 'it_female', 'pt_male', 'pt_female', 'nl_male', 'nl_female',
      'ar_male', 'hi_male', 'hi_female',
    ]},
    {id:'language', label:'Language', type:'text', placeholder:'en', value:'en'},
  ]},
  transcribe:  { label: 'Transcribe', task: 'transcription', fields: [
    {id:'audio_path', label:'Audio file', type:'file', accept:'audio/*'},
    {id:'audio_rec', label:'Or record', type:'mic'},
    {id:'language', label:'Language', type:'text', placeholder:'en', value:'en'},
  ]},
  translate:   { label: 'Translate', task: 'translation', fields: [
    {id:'text', label:'Text', type:'textarea', placeholder:'Text to translate...'},
    {id:'target', label:'Target language', type:'text', placeholder:'Spanish', value:'Spanish'},
  ]},
  summarize:   { label: 'Summarize', task: 'long_context', fields: [
    {id:'file_path', label:'File path', type:'text', placeholder:'/path/to/large-file.py'},
  ]},
  embed:       { label: 'Embed', task: 'embedding', fields: [
    {id:'text', label:'Text', type:'textarea', placeholder:'Text to embed...'},
  ]},
  unfiltered:  { label: 'Unfiltered', task: 'unfiltered', fields: [
    {id:'prompt', label:'Prompt', type:'textarea', placeholder:'Ask anything...'},
  ]},
};

let allModels = [];
let taskDefaults = {};
let profilePicks = {};

let selected = null;
let selectedModel = null;
let pickerOpen = false;
let thinkEnabled = true;
let taskThinkDefaults = {};
const toolState = {};  // per-tool saved state: {fields, model, think, output, outputClass, log}

const fmtP = (t,a) => t===a||!a ? t+'B' : t+'B/'+a+'B';
const fmtC = c => c>=1e6?Math.round(c/1e6)+'M':c>=1024?Math.floor(c/1024)+'K':c>0?''+c:'';

function _fetch(url) {
  const ctrl = new AbortController();
  setTimeout(() => ctrl.abort(), 15000);
  return fetch(url, {signal: ctrl.signal}).then(r => r.json());
}

async function init() {
  let models, tasks, profiles;
  const status = document.getElementById('model-picker-selected');
  try {
    status.innerHTML = '<span class="spinner"></span>Loading tasks…';
    const [tasksR, profilesR] = await Promise.all([
      _fetch('/api/tasks'), _fetch('/api/profiles'),
    ]);
    tasks = tasksR; profiles = profilesR;
    status.innerHTML = '<span class="spinner"></span>Discovering models…';
    models = await _fetch('/api/models');
  } catch (err) {
    document.getElementById('output').innerHTML =
      `<div style="color:#e55;padding:2em;text-align:center">
        Cannot connect to server<br>
        <button onclick="init()" style="margin-top:1em;padding:.5em 1.5em;cursor:pointer">Retry</button>
      </div>`;
    return;
  }
  allModels = models.sort((a, b) => (b.total_params_b || 0) - (a.total_params_b || 0));

  // Active profile picks
  const active = profiles.active;
  if (active && profiles.profiles[active]?.tasks) {
    profilePicks = profiles.profiles[active].tasks;
  }

  // Build task→default model and thinking defaults
  for (const [task, info] of Object.entries(tasks)) {
    taskThinkDefaults[task] = info.thinking !== undefined ? info.thinking : true;
    for (const pref of (info.defaults || [])) {
      const found = allModels.find(m => m.name === pref || m.name.startsWith(pref + ':'));
      if (found) { taskDefaults[task] = found.name; break; }
    }
  }
  document.getElementById('model-picker-header').onclick = () => {
    pickerOpen = !pickerOpen;
    document.getElementById('model-picker').className = 'model-picker' + (pickerOpen ? ' open' : '');
  };
  document.getElementById('think-toggle').onclick = (e) => {
    e.stopPropagation();
    thinkEnabled = !thinkEnabled;
    const el = document.getElementById('think-toggle');
    el.className = 'think-toggle' + (thinkEnabled ? ' on' : '');
  };
  const grid = document.getElementById('tool-grid');
  for (const [key, tool] of Object.entries(TOOLS)) {
    const b = document.createElement('button');
    b.className = 'tool-btn';
    b.textContent = tool.label;
    b.onclick = () => selectTool(key);
    grid.appendChild(b);
  }
  selectTool('code');
}

function saveToolState() {
  if (!selected) return;
  const fields = {};
  for (const f of TOOLS[selected].fields) {
    const el = document.getElementById('f_' + f.id);
    if (el && (f.type === 'text' || f.type === 'textarea' || f.type === 'select')) fields[f.id] = el.value;
  }
  const out = document.getElementById('output');
  toolState[selected] = {
    fields, model: selectedModel, think: thinkEnabled,
    output: out.innerHTML, outputClass: out.className,
    log: document.getElementById('log').textContent,
    status: document.getElementById('status').innerHTML,
  };
}

function selectTool(key) {
  if (!TOOLS[key]) key = Object.keys(TOOLS)[0];
  saveToolState();
  selected = key;
  document.querySelectorAll('.tool-btn').forEach((b, i) => {
    b.className = 'tool-btn' + (Object.keys(TOOLS)[i] === key ? ' active' : '');
  });
  const fieldsEl = document.getElementById('fields');
  fieldsEl.innerHTML = '';
  const saved = toolState[key];
  for (const f of TOOLS[key].fields) {
    const div = document.createElement('div');
    div.className = 'field';
    if (f.type === 'file') {
      div.innerHTML = `<label>${f.label}</label>` +
        `<input id="f_${f.id}" type="file" accept="${f.accept || '*/*'}">`;
    } else if (f.type === 'screenshot') {
      const label = document.createElement('label');
      label.textContent = f.label;
      div.appendChild(label);
      const row = document.createElement('div');
      row.className = 'mic-row';
      const btn = document.createElement('button');
      btn.className = 'mic-btn';
      btn.id = 'f_' + f.id + '_btn';
      btn.textContent = 'Capture Region';
      btn.onclick = () => captureScreenshot(f.id);
      row.appendChild(btn);
      const info = document.createElement('span');
      info.className = 'mic-time';
      info.id = 'f_' + f.id + '_info';
      row.appendChild(info);
      div.appendChild(row);
    } else if (f.type === 'mic') {
      const label = document.createElement('label');
      label.textContent = f.label;
      div.appendChild(label);
      const row = document.createElement('div');
      row.className = 'mic-row';
      const btn = document.createElement('button');
      btn.className = 'mic-btn';
      btn.id = 'f_' + f.id + '_btn';
      btn.textContent = 'Record';
      btn.onclick = () => toggleRecord(f.id);
      row.appendChild(btn);
      const time = document.createElement('span');
      time.className = 'mic-time';
      time.id = 'f_' + f.id + '_time';
      row.appendChild(time);
      div.appendChild(row);
    } else if (f.type === 'select') {
      const opts = (f.options || []).map(o =>
        `<option value="${o}">${o.replace(/_/g, ' ')}</option>`).join('');
      div.innerHTML = `<label>${f.label}</label>` +
        `<select id="f_${f.id}">${opts}</select>`;
    } else if (f.type === 'textarea') {
      div.innerHTML = `<label>${f.label}</label>` +
        `<textarea id="f_${f.id}" placeholder="${f.placeholder || ''}"></textarea>`;
    } else {
      div.innerHTML = `<label>${f.label}</label>` +
        `<input id="f_${f.id}" type="text" placeholder="${f.placeholder || ''}" ${f.value ? `value="${f.value}"` : ''}>`;
    }
    fieldsEl.appendChild(div);
  }
  // Restore saved field values
  if (saved) {
    for (const [id, val] of Object.entries(saved.fields || {})) {
      const el = document.getElementById('f_' + id);
      if (el) el.value = val;
    }
  }
  // Populate model card picker
  const task = TOOLS[key].task;
  const defaultModel = taskDefaults[task] || '';
  const profileModel = profilePicks[task] || '';
  selectedModel = saved?.model ?? (profileModel || defaultModel || null);
  thinkEnabled = saved?.think ?? (taskThinkDefaults[task] !== false);
  pickerOpen = false;
  renderModelPicker(task, defaultModel, profileModel);

  const out = document.getElementById('output');
  const isRunning = !!_running[key];
  if (saved?.output) {
    out.innerHTML = saved.output;
    out.className = isRunning ? 'output-box running' : (saved.outputClass || 'output-box');
  } else if (isRunning) {
    out.textContent = '';
    out.className = 'output-box running';
  } else {
    out.textContent = 'Select a tool and click Run.';
    out.className = 'output-box';
  }
  document.getElementById('log').textContent = saved?.log || '';
  document.getElementById('run').disabled = isRunning;
  const status = document.getElementById('status');
  if (isRunning) {
    const s = ((Date.now() - _running[key]) / 1000).toFixed(0);
    status.innerHTML = `<span class="elapsed">${s}s</span>`;
  } else {
    status.innerHTML = saved?.status || '';
  }
}

function renderModelPicker(task, defaultModel, profileModel) {
  const picker = document.getElementById('model-picker');
  picker.className = 'model-picker' + (pickerOpen ? ' open' : '');
  const body = document.getElementById('model-picker-body');
  body.innerHTML = '';

  const eligible = allModels.filter(m => m.eligible_tasks?.includes(task));
  const models = eligible.length ? eligible : allModels;

  const selLabel = document.getElementById('model-picker-selected');
  const selInfo = selectedModel ? allModels.find(m => m.name === selectedModel) : null;
  const selMeta = selInfo ? [selInfo.backend,
    selInfo.total_params_b ? fmtP(selInfo.total_params_b, selInfo.active_params_b) : null,
    selInfo.has_vision ? 'vision' : null].filter(Boolean).join(' \u00b7 ') : '';
  selLabel.textContent = selectedModel
    ? selectedModel.split(':')[0] + (selMeta ? ' \u00b7 ' + selMeta : '')
    : 'none';
  const thinkEl = document.getElementById('think-toggle');
  thinkEl.className = 'think-toggle' + (thinkEnabled ? ' on' : '');

  for (const m of models) {
    const card = document.createElement('div');
    const isSelected = m.name === selectedModel;
    const isLoaded = m.is_loaded;
    card.className = 'card' + (isSelected ? ' selected' : '') + (isLoaded ? ' loaded' : '');

    card.onclick = () => {
      selectedModel = m.name;
      pickerOpen = false;
      renderModelPicker(task, defaultModel, profileModel);
    };

    const meta = [];
    if (m.total_params_b) meta.push(fmtP(m.total_params_b, m.active_params_b));
    const ctx = fmtC(m.context);
    if (ctx) meta.push(ctx + ' ctx');
    if (m.has_vision) meta.push('vision');
    meta.push(m.backend);

    let badges = '';
    if (m.name === profileModel) badges += '<span class="badge profile-badge">Profile</span>';
    if (m.name === defaultModel && m.name !== profileModel) badges += '<span class="badge default">Default</span>';

    const dot = document.createElement('div'); dot.className = 'dot';
    const cardBody = document.createElement('div'); cardBody.className = 'card-body';
    const nameDiv = document.createElement('div'); nameDiv.className = 'card-name'; nameDiv.textContent = m.name;
    const metaDiv = document.createElement('div'); metaDiv.className = 'card-meta'; metaDiv.textContent = meta.join(' \u00b7 ');
    cardBody.appendChild(nameDiv); cardBody.appendChild(metaDiv);
    card.appendChild(dot); card.appendChild(cardBody);
    if (badges) { const span = document.createElement('span'); span.innerHTML = badges; while (span.firstChild) card.appendChild(span.firstChild); }
    body.appendChild(card);
  }
}

function getField(id) {
  const el = document.getElementById('f_' + id);
  return el ? el.value.trim() : '';
}

const STREAM_TOOLS = new Set(['code', 'general', 'review', 'translate', 'summarize', 'unfiltered']);
const _timers = {};   // per-tool elapsed timers
const _gpuPollers = {}; // per-tool GPU status pollers
const _running = {};  // per-tool running flag

function log(msg) {
  document.getElementById('log').textContent = msg;
}

function startTimer(tool, t0, status) {
  clearInterval(_timers[tool]);
  _timers[tool] = setInterval(() => {
    if (selected !== tool) return;
    const s = ((Date.now() - t0) / 1000).toFixed(0);
    const gpu = _lastGpuInfo;
    status.innerHTML = `<span class="elapsed">${s}s</span>${gpu ? ' · <span style="color:#e8a735">' + gpu + '</span>' : ''}`;
  }, 1000);
}

let _lastGpuInfo = '';

function startGpuPoller(tool) {
  stopGpuPoller(tool);
  _lastGpuInfo = '';
  _gpuPollers[tool] = setInterval(async () => {
    try {
      const resp = await fetch('/api/gpu');
      const data = await resp.json();
      const parts = [];
      if (data.playground) {
        const p = data.playground;
        const elapsed = Math.round((Date.now() / 1000) - p.started);
        parts.push(`${p.model.split(':')[0]} (${p.backend})`);
      }
      if (data.other_active) parts.push('Waiting on another request');
      _lastGpuInfo = parts.length > 0 ? parts.join(' · ') : '';
    } catch {
      _lastGpuInfo = '';
    }
  }, 2000);
}

function stopGpuPoller(tool) {
  clearInterval(_gpuPollers[tool]);
  delete _gpuPollers[tool];
  _lastGpuInfo = '';
}

function stopTimer(tool, t0, status, model) {
  clearInterval(_timers[tool]);
  delete _timers[tool];
  stopGpuPoller(tool);
  if (selected === tool) {
    const s = ((Date.now() - t0) / 1000).toFixed(1);
    status.innerHTML = `<span class="elapsed">${s}s</span> · ${model || '?'}`;
  }
}

async function buildBody() {
  const body = {tool: selected, model: selectedModel, think: thinkEnabled};
  for (const f of TOOLS[selected].fields) {
    if (f.type === 'file') {
      const input = document.getElementById('f_' + f.id);
      if (input.files.length) {
        const fd = new FormData();
        fd.append('file', input.files[0]);
        const upResp = await fetch('/api/test/upload', {method:'POST', body:fd});
        const upData = await upResp.json();
        if (upData.error) throw new Error(upData.error);
        body[f.id] = upData.path;
      }
    } else if (f.type === 'screenshot') {
      const companion = TOOLS[selected].fields.find(x => x.type === 'file');
      if (_screenshotPath && companion && !body[companion.id]) {
        body[companion.id] = _screenshotPath;
      }
    } else if (f.type === 'mic') {
      const companion = TOOLS[selected].fields.find(x => x.type === 'file');
      if (_recBlob && companion && !body[companion.id]) {
        const fd = new FormData();
        fd.append('file', _recBlob, 'recording.webm');
        const upResp = await fetch('/api/test/upload', {method:'POST', body:fd});
        const upData = await upResp.json();
        if (upData.error) throw new Error(upData.error);
        body[companion.id] = upData.path;
      }
    } else {
      body[f.id] = getField(f.id);
    }
  }
  return body;
}

let _abortController = null;

function cancel() {
  if (_abortController) {
    _abortController.abort();
    _abortController = null;
  }
}

async function run() {
  const btn = document.getElementById('run');
  const status = document.getElementById('status');
  const output = document.getElementById('output');
  const runTool = selected;
  _running[runTool] = Date.now();
  btn.disabled = true;
  document.getElementById('cancel-btn').style.display = '';
  _abortController = new AbortController();
  const signal = _abortController.signal;
  output.textContent = '';
  output.className = 'output-box running';

  const t0 = Date.now();
  startTimer(runTool, t0, status);
  startGpuPoller(runTool);

  try {
    log(`Tool: ${runTool} · Model: ${selectedModel}`);
    const body = await buildBody();
    if (selected !== runTool) { btn.disabled = false; return; }
    log(`Request built, sending...`);

    if (STREAM_TOOLS.has(runTool)) {
      log(`POST /api/test/stream`);
      const resp = await fetch('/api/test/stream', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
        signal,
      });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.error || `HTTP ${resp.status}`);
      }
      log(`Connected, streaming tokens...`);
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let model = '?';
      let buf = '';
      let streamText = '';
      let loggedThinking = false;
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buf += decoder.decode(value, {stream: true});
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let evt;
          try { evt = JSON.parse(line.slice(6)); } catch { continue; }
          if (evt.error) { throw new Error(evt.error); }
          if (evt.warning) { if (selected === runTool) log(`⚠ ${evt.warning}`); }
          if (evt.model) { model = evt.model; if (selected === runTool) log(`Model: ${model}`); }
          if (evt.thinking && !loggedThinking) { if (selected === runTool) log(`Thinking...`); loggedThinking = true; }
          if (evt.token) {
            streamText += evt.token;
            if (selected === runTool) {
              if (loggedThinking && !output.textContent) log(`Generating output...`);
              output.textContent = streamText;
            }
          }
          if (evt.done) { if (selected === runTool) log(`Stream complete`); break; }
        }
      }
      if (selected === runTool) {
        output.textContent = streamText;
        output.className = 'output-box';
        stopTimer(runTool, t0, status, model);
      } else {
        toolState[runTool] = {...(toolState[runTool] || {}),
          output: streamText, outputClass: 'output-box',
          log: `Stream complete`, status: `${((Date.now() - t0) / 1000).toFixed(1)}s · ${model || '?'}`};
      }

    } else {
      log(`POST /api/test`);
      const resp = await fetch('/api/test', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
        signal,
      });
      let data;
      try { data = await resp.json(); } catch {
        throw new Error(`${runTool} failed: HTTP ${resp.status} (${resp.statusText}) — response was not JSON`);
      }
      if (!resp.ok && !data.error) {
        throw new Error(`${runTool} failed: HTTP ${resp.status} — ${JSON.stringify(data)}`);
      }
      if (selected !== runTool) {
        // User switched tools — stash result without touching the DOM
        let html, cls = 'output-box';
        if (data.error) {
          html = data.error; cls = 'output-box error';
        } else if (data.audio_path) {
          html = data.result +
            `<audio controls src="/api/test/audio?path=${encodeURIComponent(data.audio_path)}" style="display:block;margin-top:8px;width:100%"></audio>`;
        } else if (data.image_path) {
          html = data.result +
            `<img src="/api/test/image?path=${encodeURIComponent(data.image_path)}">`;
        } else if (data.embeddings) {
          const dims = data.dimensions || '?', count = data.count || '?';
          html = `${count} embedding(s), ${dims} dimensions\n\n` +
            `First vector (truncated): [${data.embeddings[0]?.slice(0, 8).map(v => v.toFixed(4)).join(', ')}...]`;
        } else {
          html = data.result || JSON.stringify(data, null, 2);
        }
        toolState[runTool] = {...(toolState[runTool] || {}), output: html, outputClass: cls};
        btn.disabled = false;
        return;
      }
      if (data.warning) log(`⚠ ${data.warning}`);
      log(`Response received · model: ${data.model || '?'}`);
      output.className = 'output-box';
      stopTimer(runTool, t0, status, data.model);

      if (data.error) {
        log(`Error: ${data.error}`);
        output.textContent = data.error;
        output.className = 'output-box error';
      } else if (data.audio_path) {
        output.textContent = data.result;
        const audio = document.createElement('audio');
        audio.controls = true; audio.style.cssText = 'display:block;margin-top:8px;width:100%';
        audio.src = '/api/test/audio?path=' + encodeURIComponent(data.audio_path);
        output.appendChild(audio);
      } else if (data.image_path) {
        output.textContent = data.result;
        const img = document.createElement('img');
        img.src = '/api/test/image?path=' + encodeURIComponent(data.image_path);
        output.appendChild(img);
      } else if (data.embeddings) {
        const dims = data.dimensions || '?';
        const count = data.count || '?';
        output.textContent = `${count} embedding(s), ${dims} dimensions\n\n` +
          `First vector (truncated): [${data.embeddings[0]?.slice(0, 8).map(v => v.toFixed(4)).join(', ')}...]`;
      } else {
        output.textContent = data.result || JSON.stringify(data, null, 2);
      }
    }
  } catch (e) {
    if (selected === runTool) {
      if (e.name === 'AbortError') {
        log('Cancelled');
        output.className = 'output-box';
        stopTimer(runTool, t0, status, '');
        status.textContent = 'Cancelled';
      } else {
        log(`FAILED: ${e.message}`);
        output.textContent = e.message;
        output.className = 'output-box error';
        stopTimer(runTool, t0, status, '');
        status.textContent = 'Failed';
      }
    }
  }
  _abortController = null;
  document.getElementById('cancel-btn').style.display = 'none';
  delete _running[runTool];
  if (selected === runTool) btn.disabled = false;
}

let _screenshotPath = null;

async function captureScreenshot(id) {
  const btn = document.getElementById('f_' + id + '_btn');
  const info = document.getElementById('f_' + id + '_info');
  btn.textContent = 'Select a region...';
  info.textContent = '';
  _screenshotPath = null;
  try {
    const resp = await fetch('/api/test/screenshot', {method: 'POST'});
    const data = await resp.json();
    if (data.error) {
      info.textContent = data.error;
    } else {
      _screenshotPath = data.path;
      btn.textContent = 'Capture Region';
      info.textContent = 'Captured';
    }
  } catch (e) {
    info.textContent = e.message;
    btn.textContent = 'Capture Region';
  }
}

let _recorder = null;
let _recChunks = [];
let _recBlob = null;
let _recTimer = null;
let _recStart = 0;

async function toggleRecord(id) {
  const btn = document.getElementById('f_' + id + '_btn');
  const time = document.getElementById('f_' + id + '_time');

  if (_recorder && _recorder.state === 'recording') {
    _recorder.stop();
    btn.textContent = 'Record';
    btn.className = 'mic-btn';
    clearInterval(_recTimer);
    return;
  }

  _recChunks = [];
  _recBlob = null;
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw new Error('Microphone access not available (mediaDevices API missing)');
    }
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
      : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
    _recorder = mimeType ? new MediaRecorder(stream, {mimeType}) : new MediaRecorder(stream);
    _recorder.ondataavailable = e => { if (e.data.size) _recChunks.push(e.data); };
    _recorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      _recBlob = new Blob(_recChunks, {type: _recorder.mimeType || 'audio/webm'});
      time.textContent = `${((Date.now() - _recStart) / 1000).toFixed(1)}s recorded`;
    };
    _recorder.start();
    _recStart = Date.now();
    btn.textContent = 'Stop';
    btn.className = 'mic-btn recording';
    _recTimer = setInterval(() => {
      time.textContent = `${((Date.now() - _recStart) / 1000).toFixed(0)}s`;
    }, 500);
  } catch (e) {
    time.textContent = e.message;
  }
}

init().catch(e => {
  document.getElementById('model-picker-selected').textContent = 'Error: ' + e.message;
  console.error('init failed:', e);
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
