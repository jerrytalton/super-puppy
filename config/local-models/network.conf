# Local model network configuration
# The model server serves models to the local network.
# Other machines detect it via mDNS (Bonjour) and use it when reachable,
# falling back to their own local servers otherwise.

# mDNS hostname of the model server.
# On macOS: System Settings > General > Sharing > Local Hostname
# Example: if your server's local hostname is "my-mac", set this to "my-mac.local"
MODEL_SERVER_HOST=""

# Ports (must match the server's configs)
OLLAMA_PORT=11434
MLX_PORT=8000

# Total unified memory on the server (used for memory visualization on clients)
SERVER_RAM_GB=0

# Seconds to wait when probing the server before giving up
PROBE_TIMEOUT=2

# Tailscale hostname for remote access (set via `tailscale set --hostname super-puppy`)
# The full FQDN is resolved at runtime from `tailscale status`.
TAILSCALE_HOSTNAME="super-puppy"

# Fixed port for the profile server (Playground/Profiles UI) when serving
# over Tailscale. Random port is used for local-only access.
PROFILE_PORT=8101

# 1Password reference for the MCP auth token.
# Set this to your own 1Password item reference, or leave empty to
# provide the token manually via ~/.config/local-models/mcp_auth_token.
OP_REF=""

# Set to true if this machine is the model server (serves to the LAN).
# When false, this machine acts as a client and connects to the server
# specified by MODEL_SERVER_HOST above.
IS_SERVER=false
