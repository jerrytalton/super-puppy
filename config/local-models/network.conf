# Local model network configuration
# The desktop machine serves models to the local network.
# Other machines detect it via mDNS (Bonjour) and use it when reachable,
# falling back to their own local servers otherwise.

# mDNS hostname of the desktop (the model server).
# On macOS this is: System Settings > General > Sharing > Local Hostname
# Reachable as pancake-mouse.local on the LAN.
MODEL_SERVER_HOST="pancake-mouse.local"

# Ports (must match the desktop's server configs)
OLLAMA_PORT=11434
MLX_PORT=8000

# Total unified memory on the desktop (used for memory visualization on clients)
SERVER_RAM_GB=512

# Seconds to wait when probing the desktop before giving up
PROBE_TIMEOUT=2
