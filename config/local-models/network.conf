# Local model network configuration
# The model server runs Ollama + MLX locally. Remote machines connect
# via Tailscale (`tailscale serve` proxies all ports with TLS).

# Tailscale hostname of the model server (set via `tailscale set --hostname`).
# Clients use this to find the server peer in `tailscale status`.
# The full FQDN is resolved at runtime.
TAILSCALE_HOSTNAME="super-puppy"

# Ports (must match the server's configs)
OLLAMA_PORT=11434
MLX_PORT=8000

# Total unified memory on the server (used for memory visualization on clients)
SERVER_RAM_GB=0

# Seconds to wait when probing the server before giving up
PROBE_TIMEOUT=2

# Fixed port for the profile server (Playground/Profiles UI) when serving
# over Tailscale. Random port is used for local-only access.
PROFILE_PORT=8101

# 1Password reference for the MCP auth token.
# Set this to your own 1Password item reference, or leave empty to
# provide the token manually via ~/.config/local-models/mcp_auth_token.
OP_REF=""

# Set to true if this machine is the model server.
# When false, this machine acts as a client and connects to the server
# via Tailscale.
IS_SERVER=false
